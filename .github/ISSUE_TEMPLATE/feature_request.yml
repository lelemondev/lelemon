name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dashboard (frontend)
        - API Server (backend)
        - TypeScript SDK
        - Python SDK
        - Docker / Self-hosting
        - Documentation
        - Other
    validations:
      required: true
